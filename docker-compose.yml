services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/tet-a-tet-backend/app
      - ./backend/uploads:/tet-a-tet-backend/uploads
      - ./backend/alembic:/tet-a-tet-backend/alembic
      - ./backend/alembic.ini:/tet-a-tet-backend/alembic.ini
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL} # 🆕 Подключение к Redis
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy  # 🆕 Ждём, пока Redis будет здоров
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tete_user
      POSTGRES_PASSWORD: tete_secret_password
      POSTGRES_DB: tet_a_tet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tete_user -d tet_a_tet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🆕 Redis для кэширования
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:  # 🆕 Том для данных Redis